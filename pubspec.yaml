name: adam
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_bloc: ^8.1.3
  shared_preferences: ^2.2.3
  onesignal_flutter: ^5.6.3
  supabase_flutter: ^2.15.4
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  package_info_plus: ^8.0.0
  fl_chart: ^1.0.0
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/adam_logo.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo/adam_logo.png"

  android: true
  ios: true
  web: false

  android_12:
    color: "#FFFFFF"
    image: "assets/logo/adam_logo.png"